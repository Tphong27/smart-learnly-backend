spring:
  application:
    name: smart-learnly-backend

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    email-verification-token-ttl: ${APP_AUTH_EMAIL_VERIFICATION_TOKEN_TTL:PT24H}
    password-reset-token-ttl: ${APP_AUTH_PASSWORD_RESET_TOKEN_TTL:PT30M}
    debug-log-tokens: ${APP_AUTH_DEBUG_LOG_TOKENS:true}
  seed:
    auth-users-enabled: ${APP_SEED_AUTH_USERS_ENABLED:true}
  security:
    jwt-secret: ${JWT_SECRET:}
  integrations:
    ai-provider: ${AI_PROVIDER:none}
    payment-provider: ${PAYMENT_PROVIDER:none}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    try-it-out-enabled: true
