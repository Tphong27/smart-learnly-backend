spring:
  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST:aws-1-ap-northeast-1.pooler.supabase.com}:${SUPABASE_DB_PORT:6543}/${SUPABASE_DB_NAME:postgres}?sslmode=require&prepareThreshold=0
    username: ${SUPABASE_DB_USERNAME:postgres.csbtyhjfzhizaasahwub}
    password: ${SUPABASE_DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 10000
      validation-timeout: 5000
      idle-timeout: 120000
      keepalive-time: 60000
      max-lifetime: 240000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2
    # The shared development database contains migrations (e.g. V6/V7 and newer
    # versions applied by other teammates) whose source files are not present in
    # this local checkout. Ignore both missing (older) and future (newer) ones so
    # the app can start; strict validation is kept outside dev.
    ignore-migration-patterns: "*:missing,*:future"

app:
  # Local E2E exercises several dedicated roles from one loopback IP. Production
  # keeps the global auth limiter enabled through application.yml.
  rate-limit:
    auth:
      enabled: ${APP_RATE_LIMIT_AUTH_ENABLED:false}
  auth:
    # A complete local E2E run can exceed the production 15-minute access-token
    # lifetime. Keep this override confined to the dev profile.
    access-token-ttl: ${APP_AUTH_ACCESS_TOKEN_TTL:PT2H}
  seed:
    auth-users-enabled: ${APP_SEED_AUTH_USERS_ENABLED:true}
    categories-enabled: ${APP_SEED_CATEGORIES_ENABLED:false}
