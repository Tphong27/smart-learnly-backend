spring:
  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST:aws-1-ap-northeast-1.pooler.supabase.com}:${SUPABASE_DB_PORT:6543}/${SUPABASE_DB_NAME:postgres}?sslmode=require&prepareThreshold=0
    username: ${SUPABASE_DB_USERNAME:postgres.csbtyhjfzhizaasahwub}
    password: ${SUPABASE_DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2
    # The shared development database contains migrations (e.g. V6/V7 and newer
    # versions applied by other teammates) whose source files are not present in
    # this local checkout. Ignore both missing (older) and future (newer) ones so
    # the app can start; strict validation is kept outside dev.
    ignore-migration-patterns: "*:missing,*:future"

app:
  seed:
    auth-users-enabled: ${APP_SEED_AUTH_USERS_ENABLED:true}
    categories-enabled: ${APP_SEED_CATEGORIES_ENABLED:false}
