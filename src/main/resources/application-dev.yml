spring:
  datasource:
    url: jdbc:postgresql://${SUPABASE_DB_HOST:aws-1-ap-northeast-1.pooler.supabase.com}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require
    username: ${SUPABASE_DB_USERNAME:postgres.csbtyhjfzhizaasahwub}
    password: ${SUPABASE_DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2

app:
  seed:
    auth-users-enabled: ${APP_SEED_AUTH_USERS_ENABLED:true}
