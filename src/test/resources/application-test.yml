spring:
  datasource:
    url: jdbc:h2:mem:smartlearnly;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: false

app:
  security:
    authentication-mode: jwt
    jwt-secret: smart-learnly-test-secret-key-at-least-32-characters
  hls:
    token-secret: smart-learnly-test-hls-secret-at-least-32-characters
  seed:
    auth-users-enabled: false
