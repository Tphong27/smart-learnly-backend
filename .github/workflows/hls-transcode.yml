name: HLS Transcode to R2

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Unique processing job UUID
        required: true
        type: string
      lesson_id:
        description: Lesson UUID
        required: true
        type: string
      source_key:
        description: Object key of the source video in R2_RAW_BUCKET
        required: true
        type: string
      output_prefix:
        description: Optional output prefix; defaults to hls/{lesson_id}/{job_id}
        required: false
        type: string
      qualities:
        description: Comma-separated HLS qualities to generate
        required: false
        default: 480p,720p
        type: string
      segment_duration:
        description: HLS segment duration in seconds
        required: false
        default: "10"
        type: string
      ffmpeg_preset:
        description: FFmpeg x264 preset
        required: false
        default: veryfast
        type: string

permissions:
  contents: read

concurrency:
  group: hls-${{ inputs.lesson_id }}
  cancel-in-progress: false

jobs:
  transcode:
    name: Transcode HLS
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.R2_REGION }}
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
      R2_RAW_BUCKET: ${{ vars.R2_RAW_BUCKET }}
      R2_HLS_BUCKET: ${{ vars.R2_HLS_BUCKET }}
      R2_AI_AUDIO_BUCKET: ${{ vars.R2_AI_AUDIO_BUCKET }}
      HLS_CALLBACK_SECRET: ${{ secrets.HLS_CALLBACK_SECRET }}
      HLS_BACKEND_BASE_URL: ${{ vars.HLS_BACKEND_BASE_URL }}
      JOB_ID: ${{ inputs.job_id }}
      LESSON_ID: ${{ inputs.lesson_id }}
      SOURCE_KEY: ${{ inputs.source_key }}
      REQUESTED_OUTPUT_PREFIX: ${{ inputs.output_prefix }}
      REQUESTED_QUALITIES: ${{ inputs.qualities }}
      REQUESTED_SEGMENT_DURATION: ${{ inputs.segment_duration }}
      REQUESTED_FFMPEG_PRESET: ${{ inputs.ffmpeg_preset }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate job and configuration
        shell: bash
        run: |
          set -Eeuo pipefail

          uuid_pattern='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
          bucket_pattern='^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$'
          object_key_pattern='^[a-zA-Z0-9][a-zA-Z0-9._/-]*$'
          qualities_pattern='^(480p|720p|1080p)(,(480p|720p|1080p))*$'
          preset_pattern='^(ultrafast|superfast|veryfast|faster|fast|medium)$'

          [[ "$JOB_ID" =~ $uuid_pattern ]] || {
            echo "job_id must be a UUID." >&2
            exit 64
          }
          [[ "$LESSON_ID" =~ $uuid_pattern ]] || {
            echo "lesson_id must be a UUID." >&2
            exit 64
          }
          [[ "$R2_RAW_BUCKET" =~ $bucket_pattern ]] || {
            echo "R2_RAW_BUCKET is invalid." >&2
            exit 78
          }
          [[ "$R2_HLS_BUCKET" =~ $bucket_pattern ]] || {
            echo "R2_HLS_BUCKET is invalid." >&2
            exit 78
          }
          [[ "$R2_AI_AUDIO_BUCKET" =~ $bucket_pattern ]] || {
            echo "R2_AI_AUDIO_BUCKET is invalid." >&2
            exit 78
          }
          [[ "$R2_ENDPOINT" == https://*.r2.cloudflarestorage.com ]] || {
            echo "R2_ENDPOINT must be the private R2 S3 API endpoint." >&2
            exit 78
          }
          [[ -n "$AWS_ACCESS_KEY_ID" && -n "$AWS_SECRET_ACCESS_KEY" ]] || {
            echo "R2 credentials are unavailable." >&2
            exit 78
          }
          [[ "$AWS_DEFAULT_REGION" == "auto" ]] || {
            echo "R2_REGION must be auto." >&2
            exit 78
          }
          [[ -n "$HLS_BACKEND_BASE_URL" ]] || {
            echo "HLS_BACKEND_BASE_URL is required so the backend can be notified." >&2
            exit 78
          }
          [[ "$HLS_BACKEND_BASE_URL" == https://* ]] || {
            echo "HLS_BACKEND_BASE_URL must use HTTPS." >&2
            exit 78
          }
          [[ -n "$HLS_CALLBACK_SECRET" && ${#HLS_CALLBACK_SECRET} -ge 32 ]] || {
            echo "HLS_CALLBACK_SECRET must be configured with at least 32 characters." >&2
            exit 78
          }
          [[ "$SOURCE_KEY" =~ $object_key_pattern ]] &&
            [[ "$SOURCE_KEY" != /* && "$SOURCE_KEY" != *".."* && "$SOURCE_KEY" != *"//"* ]] || {
            echo "source_key is unsafe." >&2
            exit 64
          }

          output_prefix="$REQUESTED_OUTPUT_PREFIX"
          if [[ -z "$output_prefix" ]]; then
            output_prefix="hls/${LESSON_ID}/${JOB_ID}"
          fi
          [[ "$output_prefix" =~ $object_key_pattern ]] &&
            [[ "$output_prefix" != /* && "$output_prefix" != *".."* && "$output_prefix" != *"//"* ]] || {
            echo "output_prefix is unsafe." >&2
            exit 64
          }

          qualities="$REQUESTED_QUALITIES"
          if [[ -z "$qualities" ]]; then
            qualities="480p,720p"
          fi
          [[ "$qualities" =~ $qualities_pattern ]] || {
            echo "qualities must be a comma-separated subset of 480p,720p,1080p." >&2
            exit 64
          }

          segment_duration="$REQUESTED_SEGMENT_DURATION"
          if [[ -z "$segment_duration" ]]; then
            segment_duration="10"
          fi
          [[ "$segment_duration" =~ ^[0-9]+$ ]] &&
            ((segment_duration >= 2 && segment_duration <= 30)) || {
            echo "segment_duration must be an integer between 2 and 30." >&2
            exit 64
          }

          ffmpeg_preset="$REQUESTED_FFMPEG_PRESET"
          if [[ -z "$ffmpeg_preset" ]]; then
            ffmpeg_preset="veryfast"
          fi
          [[ "$ffmpeg_preset" =~ $preset_pattern ]] || {
            echo "ffmpeg_preset is invalid." >&2
            exit 64
          }

          echo "OUTPUT_PREFIX=$output_prefix" >>"$GITHUB_ENV"
          echo "INPUT_FILE=$RUNNER_TEMP/hls-input/source-video" >>"$GITHUB_ENV"
          echo "OUTPUT_DIR=$RUNNER_TEMP/hls-output" >>"$GITHUB_ENV"
          echo "QUALITIES_FILE=$RUNNER_TEMP/hls-qualities.txt" >>"$GITHUB_ENV"
          echo "HLS_QUALITIES=$qualities" >>"$GITHUB_ENV"
          echo "SEGMENT_DURATION=$segment_duration" >>"$GITHUB_ENV"
          echo "FFMPEG_PRESET=$ffmpeg_preset" >>"$GITHUB_ENV"
          echo "AUDIO_DURATION_FILE=$RUNNER_TEMP/video-ai-audio-duration-ms.txt" >>"$GITHUB_ENV"

      - name: Install FFmpeg and R2 client dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          command -v aws >/dev/null 2>&1 || {
            echo "AWS CLI is not available on this GitHub-hosted runner." >&2
            exit 78
          }
          aws --version

          missing_packages=()
          command -v ffmpeg >/dev/null 2>&1 || missing_packages+=(ffmpeg)
          command -v jq >/dev/null 2>&1 || missing_packages+=(jq)
          if ((${#missing_packages[@]} > 0)); then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends "${missing_packages[@]}"
          fi
          ffmpeg -version | sed -n '1p'
          jq --version

      - name: Download source video from R2
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p -- "$(dirname "$INPUT_FILE")"
          time aws \
            --endpoint-url "$R2_ENDPOINT" \
            s3 cp \
            "s3://${R2_RAW_BUCKET}/${SOURCE_KEY}" \
            "$INPUT_FILE" \
            --no-progress
          test -s "$INPUT_FILE"

      - name: Transcode source video to encrypted HLS
        shell: bash
        run: |
          set -Eeuo pipefail
          time bash scripts/hls/transcode.sh \
            "$INPUT_FILE" \
            "$OUTPUT_DIR" \
            "$SEGMENT_DURATION" \
            "$QUALITIES_FILE" \
            "$HLS_QUALITIES" \
            "$FFMPEG_PRESET" \
            "$AUDIO_DURATION_FILE"

      - name: Upload HLS output to R2
        shell: bash
        run: |
          set -Eeuo pipefail
          test -s "$OUTPUT_DIR/master.m3u8"
          test -s "$OUTPUT_DIR/enc.key"
          time aws \
            --endpoint-url "$R2_ENDPOINT" \
            s3 sync \
            "$OUTPUT_DIR" \
            "s3://${R2_HLS_BUCKET}/${OUTPUT_PREFIX}" \
            --delete \
            --exclude "ai/*" \
            --no-progress

      - name: Upload private AI audio derivative to R2
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ -s "$OUTPUT_DIR/ai/source.mp3" ]]; then
            time aws \
              --endpoint-url "$R2_ENDPOINT" \
              s3 cp \
              "$OUTPUT_DIR/ai/source.mp3" \
              "s3://${R2_AI_AUDIO_BUCKET}/${OUTPUT_PREFIX}/ai/source.mp3" \
              --content-type "audio/mpeg" \
              --no-progress
          fi

      - name: Notify backend of success
        if: ${{ success() }}
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ -z "$HLS_BACKEND_BASE_URL" ]]; then
            echo "HLS_BACKEND_BASE_URL is required so the backend can be notified." >&2
            exit 78
          fi
          [[ "$HLS_BACKEND_BASE_URL" == https://* ]] || {
            echo "HLS_BACKEND_BASE_URL must use HTTPS." >&2
            exit 78
          }
          if [[ -z "$HLS_CALLBACK_SECRET" || ${#HLS_CALLBACK_SECRET} -lt 32 ]]; then
            echo "HLS_CALLBACK_SECRET must be configured with at least 32 characters." >&2
            exit 78
          fi

          qualities_json=$(jq -R -s 'split("\n") | map(select(length > 0))' "$QUALITIES_FILE")
          ai_audio_object_key=""
          ai_audio_duration_ms=""
          if [[ -s "$OUTPUT_DIR/ai/source.mp3" && -s "$AUDIO_DURATION_FILE" ]]; then
            ai_audio_object_key="${OUTPUT_PREFIX}/ai/source.mp3"
            ai_audio_duration_ms=$(tr -d '[:space:]' <"$AUDIO_DURATION_FILE")
            [[ "$ai_audio_duration_ms" =~ ^[1-9][0-9]*$ ]] || {
              echo "AI audio duration is invalid." >&2
              exit 70
            }
          fi
          body=$(jq -cn \
            --arg jobId "$JOB_ID" \
            --arg lessonId "$LESSON_ID" \
            --arg status "ready" \
            --arg r2BasePath "$OUTPUT_PREFIX" \
            --arg masterPlaylistPath "${OUTPUT_PREFIX}/master.m3u8" \
            --arg aiAudioObjectKey "$ai_audio_object_key" \
            --arg aiAudioDurationMs "$ai_audio_duration_ms" \
            --argjson qualities "$qualities_json" \
            '{
              jobId: $jobId,
              lessonId: $lessonId,
              status: $status,
              r2BasePath: $r2BasePath,
              masterPlaylistPath: $masterPlaylistPath,
              qualities: $qualities,
              aiAudioObjectKey: (if $aiAudioObjectKey == "" then null else $aiAudioObjectKey end),
              aiAudioDurationMs: (if $aiAudioDurationMs == "" then null else ($aiAudioDurationMs | tonumber) end)
            }')
          timestamp=$(date +%s)
          signature=$(BODY="$body" TIMESTAMP="$timestamp" SECRET="$HLS_CALLBACK_SECRET" python3 - <<'PY'
          import hashlib
          import hmac
          import os

          message = f"{os.environ['TIMESTAMP']}.{os.environ['BODY']}".encode()
          secret = os.environ["SECRET"].encode()
          print(hmac.new(secret, message, hashlib.sha256).hexdigest())
          PY
          )

          curl \
            --silent \
            --show-error \
            --fail-with-body \
            --retry 3 \
            --retry-delay 2 \
            --retry-all-errors \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-HLS-Timestamp: $timestamp" \
            --header "X-HLS-Signature: $signature" \
            --data "$body" \
            "${HLS_BACKEND_BASE_URL%/}/api/v1/internal/hls/jobs/callback"

      - name: Delete private raw source
        if: ${{ success() }}
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          aws \
            --endpoint-url "$R2_ENDPOINT" \
            s3 rm \
            "s3://${R2_RAW_BUCKET}/${SOURCE_KEY}" \
            --no-progress

      - name: Notify backend of failure
        if: ${{ failure() }}
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ -z "$HLS_BACKEND_BASE_URL" || -z "$HLS_CALLBACK_SECRET" ]]; then
            echo "Backend callback is not configured; failure callback skipped."
            exit 0
          fi
          [[ "$HLS_BACKEND_BASE_URL" == https://* ]] || {
            echo "HLS_BACKEND_BASE_URL must use HTTPS." >&2
            exit 78
          }

          body=$(jq -cn \
            --arg jobId "$JOB_ID" \
            --arg lessonId "$LESSON_ID" \
            --arg status "failed" \
            --arg errorMessage "GitHub Actions HLS transcoding failed. Review the workflow run logs." \
            '{
              jobId: $jobId,
              lessonId: $lessonId,
              status: $status,
              errorMessage: $errorMessage
            }')
          timestamp=$(date +%s)
          signature=$(BODY="$body" TIMESTAMP="$timestamp" SECRET="$HLS_CALLBACK_SECRET" python3 - <<'PY'
          import hashlib
          import hmac
          import os

          message = f"{os.environ['TIMESTAMP']}.{os.environ['BODY']}".encode()
          secret = os.environ["SECRET"].encode()
          print(hmac.new(secret, message, hashlib.sha256).hexdigest())
          PY
          )

          curl \
            --silent \
            --show-error \
            --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-HLS-Timestamp: $timestamp" \
            --header "X-HLS-Signature: $signature" \
            --data "$body" \
            "${HLS_BACKEND_BASE_URL%/}/api/v1/internal/hls/jobs/callback"
